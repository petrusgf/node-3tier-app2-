substitutions:
  _REGION: us-central1
  _CLUSTER_LOCATION: us-central1
  _CLUSTER: app-prod-cluster
  _REGISTRY: us-central1-docker.pkg.dev/${PROJECT_ID}/app-prod-app
  _WEB_DOMAIN: web.aiforu2.com
  _API_DOMAIN: api.aiforu2.com

steps:
  # ── Tests (run in parallel) ─────────────────────────────────────────────
  - name: node:20-alpine
    id: test-api
    dir: api
    entrypoint: sh
    args:
      - -c
      - npm install && npm test
    waitFor: ['-']

  - name: node:20-alpine
    id: test-web
    dir: web
    entrypoint: sh
    args:
      - -c
      - npm install && npm test
    waitFor: ['-']

  # ── Build images (parallel, after tests pass) ───────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-api
    args:
      - build
      - -t
      - ${_REGISTRY}/api:${COMMIT_SHA}
      - -t
      - ${_REGISTRY}/api:latest
      - --cache-from
      - ${_REGISTRY}/api:latest
      - -f
      - docker/api/Dockerfile
      - .
    waitFor: [test-api]

  - name: gcr.io/cloud-builders/docker
    id: build-web
    args:
      - build
      - -t
      - ${_REGISTRY}/web:${COMMIT_SHA}
      - -t
      - ${_REGISTRY}/web:latest
      - --cache-from
      - ${_REGISTRY}/web:latest
      - -f
      - docker/web/Dockerfile
      - .
    waitFor: [test-web]

  # ── Push images ──────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-api
    args:
      - push
      - --all-tags
      - ${_REGISTRY}/api
    waitFor: [build-api]

  - name: gcr.io/cloud-builders/docker
    id: push-web
    args:
      - push
      - --all-tags
      - ${_REGISTRY}/web
    waitFor: [build-web]

  # ── Deploy to GKE ────────────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        gcloud container clusters get-credentials ${_CLUSTER} \
          --location ${_CLUSTER_LOCATION} --project ${PROJECT_ID}

        # Base resources — namespace must be first
        kubectl apply -f k8s/base/namespace.yaml
        kubectl apply -f k8s/base/configmap.yaml
        kubectl apply -f k8s/base/networkpolicy.yaml

        # ServiceAccounts with Workload Identity SA emails substituted
        sed -e "s|WEB_WORKLOAD_SA_EMAIL|app-prod-web@${PROJECT_ID}.iam.gserviceaccount.com|g" \
            -e "s|API_WORKLOAD_SA_EMAIL|app-prod-api@${PROJECT_ID}.iam.gserviceaccount.com|g" \
            k8s/base/serviceaccounts.yaml | kubectl apply -f -

        # Fetch DB credentials from Secret Manager → k8s secret
        DB_PASS=$$(gcloud secrets versions access latest \
          --secret="app-prod-db-password" --project="${PROJECT_ID}")
        DB_HOST=$$(gcloud secrets versions access latest \
          --secret="app-prod-db-host" --project="${PROJECT_ID}")

        kubectl create secret generic db-credentials -n prod \
          --from-literal=password="$$DB_PASS" \
          --from-literal=host="$$DB_HOST" \
          --save-config --dry-run=client -o yaml | kubectl apply -f -

        # BackendConfigs (CDN config)
        kubectl apply -f k8s/web/backendconfig.yaml
        kubectl apply -f k8s/api/backendconfig.yaml

        # Delete old separate ingresses if they exist
        kubectl delete ingress web-ingress api-ingress -n prod --ignore-not-found

        # Single ingress with both host rules and real domains substituted
        sed -e "s|WEB_DOMAIN|${_WEB_DOMAIN}|g" \
            -e "s|API_DOMAIN|${_API_DOMAIN}|g" \
            k8s/base/ingress.yaml | kubectl apply -f -

        # Deployments with real image tags
        sed -e "s|REGISTRY_URL|${_REGISTRY}|g" \
            -e "s|IMAGE_TAG|${COMMIT_SHA}|g" \
            k8s/web/deployment.yaml | kubectl apply -f -
        sed -e "s|REGISTRY_URL|${_REGISTRY}|g" \
            -e "s|IMAGE_TAG|${COMMIT_SHA}|g" \
            k8s/api/deployment.yaml | kubectl apply -f -

        # Services, HPA, PDB
        kubectl apply -f k8s/web/service.yaml
        kubectl apply -f k8s/api/service.yaml
        kubectl apply -f k8s/web/hpa.yaml
        kubectl apply -f k8s/web/pdb.yaml
        kubectl apply -f k8s/api/hpa.yaml
        kubectl apply -f k8s/api/pdb.yaml

        # Wait for rollout
        kubectl rollout status deployment/web -n prod --timeout=300s
        kubectl rollout status deployment/api -n prod --timeout=300s
    waitFor: [push-api, push-web]

  # ── Smoke test ───────────────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: health-check
    entrypoint: bash
    args:
      - -c
      - |
        bash scripts/health-check.sh
    env:
      - WEB_URL=https://${_WEB_DOMAIN}
      - API_URL=https://${_API_DOMAIN}
    waitFor: [deploy]

images:
  - ${_REGISTRY}/api:${COMMIT_SHA}
  - ${_REGISTRY}/web:${COMMIT_SHA}

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
