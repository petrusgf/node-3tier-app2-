apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: api-backend-config
  namespace: prod
spec:
  cdn:
    enabled: false    # No CDN on the API tier — responses are dynamic
  healthCheck:
    checkIntervalSec: 15
    port: 4000
    type: HTTP
    requestPath: /health
  connectionDraining:
    drainingTimeoutSec: 60
  timeoutSec: 60
