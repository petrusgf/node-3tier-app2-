apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: prod
  labels:
    app: web
  annotations:
    # Enable Cloud CDN on this backend via BackendConfig
    cloud.google.com/backend-config: '{"default": "web-backend-config"}'
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
